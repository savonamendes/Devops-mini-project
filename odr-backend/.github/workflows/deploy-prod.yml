name: Deploy Backend to EC2

on:
  push:
    branches: [prod]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Write production environment file
        run: |
          echo "Creating .env.production..."
          cat << 'EOF' > .env.production
          ${{ secrets.PROD_ENV_FILE }}
          EOF

          if [[ -f .env.production && -s .env.production ]]; then
            echo ".env.production created successfully"
          else
            echo "Failed to create .env.production"
            exit 1
          fi

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Build TypeScript
        run: bun run tsc

      - name: Prepare deployment archive
        run: |
          mkdir deploy
          cp -r dist prisma deploy/
          cp .env.production package.json bun.lock deploy/
          tar -czf backend.tar.gz -C deploy .
          echo "Deployment archive created successfully"

      - name: Upload to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_BACKEND_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_BACKEND_KEY }}
          source: backend.tar.gz
          target: /home/ec2-user/

      - name: SSH into EC2 and restart PM2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_BACKEND_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_BACKEND_KEY }}
          script: |
            set -e
            # Install Node.js (required for pm2 and other tools) - Amazon Linux version
            #curl -fsSL https://rpm.nodesource.com/setup_20.x | sudo bash -
            #sudo yum install -y nodejs
            # Install PM2 globally
            #sudo npm install -g pm2
            # Install Bun globally
            #curl -fsSL https://bun.sh/install | bash
            #export PATH="$HOME/.bun/bin:$PATH"
            cd /home/ec2-user
            rm -rf odr-backend
            mkdir odr-backend
            tar -xzf backend.tar.gz -C odr-backend
            cd odr-backend
            if [ -f .env.production ]; then
              echo ".env.production deployed successfully"
            else
              echo ".env.production missing on server"
              exit 1
            fi
            bun install --no-save
            bunx prisma generate
            pm2 delete odr-backend || true
            pm2 start dist/server.js --name odr-backend
            pm2 save
