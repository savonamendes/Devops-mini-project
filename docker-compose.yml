# =============================================================
#  Docker Compose – ODR India Full-Stack
#
#  Network topology
#  ─────────────────────────────────────────────────────────────
#  ┌──────────────────────────────────────────────────────────┐
#  │  Host / Internet                                         │
#  │                                                          │
#  │  :80 / :443 ──► [frontend] ──► [backend]  (private net) │
#  │                                    │                     │
#  │                                    └── AWS RDS (TLS)    │
#  └──────────────────────────────────────────────────────────┘
#
#  The BACKEND is on network "private_net" only –
#  no ports are published to the host, so it is completely
#  unreachable from the public internet.
# =============================================================

version: "3.9"

services:

  # ─────────────────────────────────────────────
  #  BACKEND  –  Express / TypeScript (port 4000)
  #  Only accessible from the private_net
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./odr-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    # The frontend container reaches it via http://backend:4000 (internal DNS).
    env_file:
      - ./odr-backend/.env.production
    environment:
      # Override / add values that must be set at runtime by Docker, not from file
      FRONTEND_URL: http://frontend:3000
    networks:
      - private_net
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/api/csrf-token', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  #  FRONTEND  –  Next.js (port 3000)
  #  Exposed to the host; proxies API calls to backend
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./odrindia
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars must be baked in at build time – sourced from odrindia/.env.production
        NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: 700845914621-hj3l8tm0v7u8isrp98h0ff9vlp75e7ru.apps.googleusercontent.com
        NEXT_PUBLIC_JITSI_SERVER: meet.jit.si
        NEXT_PUBLIC_JITSI_ROOM_PREFIX: odrindia-
    restart: unless-stopped
    ports:
      - "3000:3000" # Change to "80:3000" or use nginx in front when going to production
    env_file:
      - ./odrindia/.env.production
    environment:
      # Override BACKEND_URL so Next.js server-side calls go through the private network
      BACKEND_URL: http://backend:4000/api
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - private_net # same network so it can reach backend by DNS name
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\"" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  #  PROMETHEUS  –  Metrics collection (port 9090)
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - private_net
    depends_on:
      backend:
        condition: service_healthy

  # ─────────────────────────────────────────────
  #  GRAFANA  –  Metrics visualization (port 3001)
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000" # Mapped to 3001 as 3000 is used by frontend
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./prometheus/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - private_net
    depends_on:
      - prometheus

# ─────────────────────────────────────────────
#  Networks
# ─────────────────────────────────────────────
networks:
  private_net:
    driver: bridge
    # `internal: true` would completely block internet access from containers
    # (needed for outbound calls to AWS RDS / SendGrid / Together AI).
    # We leave it as a normal bridge so containers can reach external services,
    # but we rely on NEVER publishing backend ports to keep it off the internet.
    internal: false

# ─────────────────────────────────────────────
#  Volumes
# ─────────────────────────────────────────────
volumes:
  prometheus_data:
  grafana_data:
