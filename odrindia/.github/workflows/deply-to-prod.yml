name: Build and Deploy to EC2

on:
  push:
    branches: [prod]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Check required secrets
        run: |
          # Check required environment secrets exist without printing values
          if [ -z "${{ secrets.ENV_FILE }}" ]; then echo "ENV_FILE secret is required"; exit 1; fi
          if [ -z "${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}" ]; then echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID secret is required"; exit 1; fi
          if [ -z "${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" ]; then echo "NEXT_PUBLIC_API_BASE_URL secret is required"; exit 1; fi
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "EC2_HOST secret is required"; exit 1; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then echo "EC2_USER secret is required"; exit 1; fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "EC2_SSH_KEY secret is required"; exit 1; fi

      - name: Create environment files
        run: |
          # Create .env.production with all variables (server and client, loaded in production)
          echo "# Generated by GitHub Actions" > .env.production
          echo "${{ secrets.ENV_FILE }}" >> .env.production
          echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}" >> .env.production
          echo "NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" >> .env.production

      - name: Install production dependencies
        run: |
          bun install --production
          if [ $? -ne 0 ]; then
            echo "Error: Production dependency installation failed"
            exit 1
          fi

      - name: Install dependencies
        run: |
          bun install
          if [ $? -ne 0 ]; then
            echo "Error: Dependency installation failed"
            exit 1
          fi

      - name: Build Next.js app
        run: |
          bun run build
          if [ $? -ne 0 ]; then
            echo "Error: Build failed"
            exit 1
          fi
          if [ ! -d .next ]; then
            echo "Error: .next directory not found after build"
            exit 1
          fi

      - name: Package build artifacts and prod modules
        run: |
          tar czf deploy_package.tgz \
            .next \
            public \
            package.json \
            ecosystem.config.js \
            .env.production \
            node_modules
          if [ ! -f deploy_package.tgz ]; then
            echo "Error: Failed to create deploy package"
            exit 1
          fi

      - name: Ensure remote directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /var/www/odrlab-frontend

      - name: Copy package to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: deploy_package.tgz
          target: /var/www/odrlab-frontend

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /var/www/odrlab-frontend

            # Install jq if not present (needed for verification)
            if ! command -v jq > /dev/null 2>&1; then
              sudo apt update && sudo apt install -y jq
            fi

            # Clean old deployment (keep logs if needed)
            rm -rf .next public node_modules package.json ecosystem.config.js .env.production

            # Extract new package
            tar xzf deploy_package.tgz
            if [ $? -ne 0 ]; then
              echo "Error: Failed to extract deploy package"
              exit 1
            fi

            # Ensure Bun path
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"

            # Restart or start PM2
            if pm2 describe odrlab-frontend > /dev/null 2>&1; then
              pm2 reload odrlab-frontend
              if [ $? -ne 0 ]; then
                echo "Error: PM2 reload failed"
                exit 1
              fi
            else
              pm2 start "bun run start" \
                --name odrlab-frontend \
                --max-memory-restart 220M \
                --time
              if [ $? -ne 0 ]; then
                echo "Error: PM2 start failed"
                exit 1
              fi
            fi

            pm2 save
            if [ $? -ne 0 ]; then
              echo "Error: PM2 save failed"
              exit 1
            fi

            # Verify deployment
            pm2 jlist | jq -e '.[] | select(.name == "odrlab-frontend") | .pm2_env.status == "online"' > /dev/null
            if [ $? -ne 0 ]; then
              echo "Error: odrlab-frontend is not online after deployment"
              pm2 logs odrlab-frontend --lines 20
              exit 1
            fi

            echo "Deployment successful: odrlab-frontend is running"
